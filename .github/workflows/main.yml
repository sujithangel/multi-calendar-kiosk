name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build
        shell: bash
        run: |
          DIR=$(dirname "$(find . -name package.json -not -path '*/node_modules/*' | head -n1)")
          echo "Building in: $DIR"
          cd "$DIR"
          npm install
          npm run dist
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: MultiCalendarKiosk-windows
          path: '**/dist/*.exe'
